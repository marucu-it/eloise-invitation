<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You're Invited!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 50%, #f5a9b8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            transition: all 0.3s ease;
        } 

        body.show-video {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
        }

        /* Decorative dried flowers background */
        body::before,
        body::after {
            content: '';
            position: fixed;
            pointer-events: none;
            opacity: 0.3;
        }

        body::before {
            top: -50px;
            left: -50px;
            width: 400px;
            height: 400px;
            background-image: radial-gradient(circle at 30% 20%, rgba(218, 165, 155, 0.6) 1px, transparent 1px),
                radial-gradient(circle at 60% 40%, rgba(218, 165, 155, 0.5) 1.5px, transparent 1.5px),
                radial-gradient(circle at 20% 60%, rgba(218, 165, 155, 0.4) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        body::after {
            bottom: -50px;
            right: -50px;
            width: 400px;
            height: 400px;
            background-image: radial-gradient(circle at 30% 20%, rgba(218, 165, 155, 0.6) 1px, transparent 1px),
                radial-gradient(circle at 60% 40%, rgba(218, 165, 155, 0.5) 1.5px, transparent 1.5px),
                radial-gradient(circle at 20% 60%, rgba(218, 165, 155, 0.4) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        body.show-video::before,
        body.show-video::after {
            opacity: 0;
        }

        .container {
            max-width: 900px;
            width: 100%;
            position: relative;
            z-index: 1;
            transition: all 0.3s ease;
        }

        .invitation-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 60px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: center;
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: all 0.3s ease;
            transform-origin: center;
        }

        .invitation-card:hover {
            transform: scale(1.02);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.2);
        }

        .invitation-card.hide {
            opacity: 0;
            transform: scale(0.8);
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .invitation-card {
                grid-template-columns: 1fr;
                padding: 40px 30px;
                gap: 30px;
            }
        }

        /* Left Section - Images */
        .left-section {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .photo-grid {
            border: 3px solid #d4a5a0;
            border-radius: 10px;
            padding: 15px;
            background: white;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            max-width: 280px;
        }

        .photo-grid img {
            width: 100%;
            border-radius: 8px;
            object-fit: cover;
            aspect-ratio: 3/4;
        }

        .photo-grid img:first-child {
            grid-row: span 2;
            aspect-ratio: 3/8;
        }

        .teddy-bear {
            position: absolute;
            left: -60px;
            top: 50%;
            transform: translateY(-50%);
            max-width: 150px;
            opacity: 0.9;
            z-index: 2;
        }

        @media (max-width: 768px) {
            .teddy-bear {
                position: relative;
                left: 0;
                top: 0;
                transform: none;
                max-width: 120px;
            }
        }

        /* Right Section - Invitation Text & QR */
        .right-section {
            display: flex;
            flex-direction: column;
            gap: 30px;
            text-align: center;
        }

        .invitation-text {
            letter-spacing: 2px;
            line-height: 1.8;
        }

        .invitation-text h1 {
            font-size: 32px;
            color: #b39ddb;
            margin-bottom: 20px;
            font-weight: normal;
        }

        .invitation-text p {
            font-size: 14px;
            color: #7a6b7a;
            text-transform: uppercase;
            word-spacing: 4px;
            line-height: 2;
        }

        .highlight {
            color: #d4a5a0;
            font-style: italic;
        }

        .qr-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .qr-code {
            width: 150px;
            height: 150px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qr-code:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
        }

        .qr-code img {
            width: 100%;
            height: 100%;
            border-radius: 4px;
        }

        .qr-text {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-rsvp {
            background: linear-gradient(135deg, #d4a5a0, #b39ddb);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: 'Georgia', serif;
        }

        .btn-rsvp:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(212, 165, 160, 0.3);
        }

        /* Envelope decoration */
        .envelope {
    position: relative;
    width: 160px;
    margin: 0 auto 30px auto;
    cursor: pointer;
    perspective: 600px; /* for flap 3D tilt */
}

.envelope-flap {
    width: 100%;
    height: 50px;
    background: linear-gradient(to bottom, #ffb6c1, #f5a9b8);
    border-radius: 20px 20px 0 0;
    position: relative;
    transform-origin: top;
    transition: transform 0.3s ease;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* flap lifts slightly on hover */
.envelope:hover .envelope-flap {
    transform: rotateX(-15deg);
}

.envelope-body {
    width: 100%;
    height: 60px;
    background: linear-gradient(to bottom, #ffe4e1, #f8d7de);
    border-radius: 0 0 20px 20px;
    border: 2px solid #ffb6c1;
    box-shadow: inset 0 5px 10px rgba(0,0,0,0.05);
    position: relative;
    z-index: 1;
}

.envelope-heart {
    position: absolute;
    top: 15px;
    left: 50%;
    transform: translateX(-50%) scale(1);
    font-size: 24px;
    z-index: 2;
    transition: transform 0.3s ease;
}

.envelope:hover .envelope-heart {
    transform: translateX(-50%) scale(1.3) rotate(-10deg);
}

.invited-text {
    position: absolute;
    top: -20px;
    left: 50%;
    transform: translateX(-50%);
    background: #fff;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: bold;
    color: #d946a0;
    font-style: italic;
    white-space: nowrap;
    animation: float 2s infinite ease-in-out;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

/* small floating animation for “You're invited!” text */
@keyframes float {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(-5px); }
}

        /* Video Section Styles */
        .video-section {
            display: none;
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            padding: 20px;
        }

        .video-section.active {
            display: flex;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .video-container {
            width: 100%;
            max-width: 450px;   /* smaller width for portrait */
            height: 900px;      /* taller container */
            margin: auto;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            height: 0;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 20px;
        }

        .video-header {
            color: white;
            text-align: center;
            animation: slideDown 0.6s ease;
        }

        .video-header h2 {
            font-size: 36px;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .video-header p {
            font-size: 16px;
            color: #ddd;
            letter-spacing: 1px;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .video-controls {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn-back {
            background: linear-gradient(135deg, #d4a5a0, #b39ddb);
            color: white;
            border: none;
            padding: 14px 35px;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            font-family: 'Georgia', serif;
        }

        .btn-back:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(212, 165, 160, 0.4);
        }

        .btn-back:active {
            transform: translateY(-1px);
        }

        @media (max-width: 768px) {
            .video-header h2 {
                font-size: 24px;
            }

            .video-header p {
                font-size: 14px;
            }

            .video-controls {
                margin-top: 20px;
            }
        }
    </style>
</head>

<body>
    <div class="container" id="invitationContainer">
        <div class="invitation-card" id="invitationCard">
            <div class="left-section">
                <svg class="teddy-bear" viewBox="0 0 200 280" xmlns="http://www.w3.org/2000/svg">
                    <!-- Teddy bear body -->
                    <ellipse cx="100" cy="150" rx="50" ry="70" fill="#e8dcc8" />
                    <!-- Head -->
                    <circle cx="100" cy="70" r="50" fill="#e8dcc8" />
                    <!-- Ears -->
                    <circle cx="70" cy="30" r="20" fill="#e8dcc8" />
                    <circle cx="130" cy="30" r="20" fill="#e8dcc8" />
                    <circle cx="70" cy="35" r="12" fill="#d4a5a0" />
                    <circle cx="130" cy="35" r="12" fill="#d4a5a0" />
                    <!-- Eyes -->
                    <circle cx="85" cy="65" r="6" fill="#3d3d3d" />
                    <circle cx="115" cy="65" r="6" fill="#3d3d3d" />
                    <!-- Snout -->
                    <ellipse cx="100" cy="85" rx="15" ry="12" fill="#f0e6d8" />
                    <!-- Nose -->
                    <ellipse cx="100" cy="83" rx="4" ry="5" fill="#3d3d3d" />
                    <!-- Mouth -->
                    <path d="M 100 88 Q 95 92 90 90" stroke="#3d3d3d" stroke-width="2" fill="none" />
                    <path d="M 100 88 Q 105 92 110 90" stroke="#3d3d3d" stroke-width="2" fill="none" />
                    <!-- Blush -->
                    <circle cx="65" cy="75" r="8" fill="#f5a9b8" opacity="0.6" />
                    <circle cx="135" cy="75" r="8" fill="#f5a9b8" opacity="0.6" />
                    <!-- Arms -->
                    <ellipse cx="60" cy="130" rx="18" ry="45" fill="#e8dcc8" transform="rotate(-30 60 130)" />
                    <ellipse cx="140" cy="130" rx="18" ry="45" fill="#e8dcc8" transform="rotate(30 140 130)" />
                    <!-- Heart -->
                    <path
                        d="M 100 110 C 90 105 80 110 80 120 C 80 130 100 145 100 145 C 100 145 120 130 120 120 C 120 110 110 105 100 110 Z"
                        fill="#f5a9b8" />
                </svg>

                <div class="photo-grid">
                    <img src="public/eli1.jpg" alt="Baby photo 1">
                    <img src="public/eli2.jpg" alt="Baby photo 2">
                    <img src="public/eli3.jpg" alt="Baby photo 3">
                </div>
            </div>

            <div class="right-section">
                <div class="envelope">
                    <div class="envelope-flap"></div>
                    <div class="envelope-body"></div>
                    <div class="envelope-heart">💖</div>
                    <div class="invited-text">You're invited!</div>
                </div>

                <div class="invitation-text">
                    <h1>Hi! I'm Eli 🧸</h1>
                    <p>I would love for you to come to my</p>
                    <p><strong>Special Celebration!</strong></p>
                    <p><span class="highlight">Date:</span> Coming Soon</p>
                    <p><span class="highlight">Time:</span> TBA</p>
                </div>

                <button class="btn-rsvp" onclick="window.location.href='video.html'">
                    Click me to see Eli's video invitation 🎥
                </button>
            </div>
        </div>
    </div>

    <script>
        function showInstructions() {
            const invitationCard = document.getElementById('invitationCard');
            const videoSection = document.getElementById('videoSection');
            const body = document.body;

            // Fade out invitation
            invitationCard.classList.add('hide');

            // Change body background
            setTimeout(() => {
                body.classList.add('show-video');
                videoSection.classList.add('active');
            }, 300);
        }

        function goBackToInvitation() {
            const invitationCard = document.getElementById('invitationCard');
            const videoSection = document.getElementById('videoSection');
            const body = document.body;

            // Fade out video
            videoSection.classList.remove('active');

            setTimeout(() => {
                body.classList.remove('show-video');
                invitationCard.classList.remove('hide');
            }, 300);
        }
    </script>
</body>

</html>
