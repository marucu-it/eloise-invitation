<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="public/favicon.png">
    <title>You're Invited!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 50%, #f5a9b8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Floating Bokeh & Sparkles */
        .bokeh,
        .confetti,
        .sparkle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
        }

        .bokeh {
            width: 30px;
            height: 30px;
            background: rgba(255, 182, 193, 0.15);
            filter: blur(10px);
            animation: floatBokeh 20s linear infinite;
        }

        .bokeh:nth-child(2) {
            width: 50px;
            height: 50px;
            background: rgba(255, 192, 203, 0.12);
            animation-duration: 25s;
        }

        .bokeh:nth-child(3) {
            width: 40px;
            height: 40px;
            background: rgba(255, 182, 193, 0.1);
            animation-duration: 22s;
        }

        @keyframes floatBokeh {
            0% {
                transform: translateY(0) translateX(0);
                opacity: 0.1;
            }

            50% {
                transform: translateY(-400px) translateX(50px);
                opacity: 0.3;
            }

            100% {
                transform: translateY(-800px) translateX(0);
                opacity: 0.1;
            }
        }

        .sparkle {
            width: 6px;
            height: 6px;
            background: rgba(255, 255, 255, 0.8);
            animation: sparkleMove 6s linear infinite;
        }

        @keyframes sparkleMove {
            0% {
                transform: translateY(0) translateX(0);
                opacity: 0.2;
            }

            50% {
                transform: translateY(-200px) translateX(100px);
                opacity: 0.8;
            }

            100% {
                transform: translateY(-400px) translateX(0);
                opacity: 0.2;
            }
        }

        .confetti {
            width: 8px;
            height: 8px;
            background: linear-gradient(45deg, #f5a9b8, #d4a5a0);
            transform: rotate(45deg);
            animation: confettiFall 10s linear infinite;
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(1000px) rotate(360deg);
                opacity: 0;
            }
        }

        .container {
            max-width: 900px;
            width: 100%;
            position: relative;
            z-index: 1;
            transition: all 0.3s ease;
        }

        .invitation-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 25px;
            padding: 60px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.2);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: center;
            backdrop-filter: blur(12px);
            cursor: pointer;
            transition: all 0.3s ease;
            transform-origin: center;
            position: relative;
        }

        .invitation-card:hover {
            transform: scale(1.03);
            box-shadow: 0 35px 100px rgba(0, 0, 0, 0.25);
        }

        .invitation-card.hide {
            opacity: 0;
            transform: scale(0.8);
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .invitation-card {
                grid-template-columns: 1fr;
                padding: 40px 30px;
                gap: 30px;
            }
        }

        /* Left Section - Images */
        .left-section {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .photo-grid {
            border: 3px solid #d4a5a0;
            border-radius: 12px;
            padding: 15px;
            background: white;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            max-width: 280px;
            box-shadow: 0 10px 20px rgba(212, 165, 160, 0.3);
        }

        .photo-grid img {
            width: 100%;
            border-radius: 10px;
            object-fit: cover;
            aspect-ratio: 3/4;
            transition: transform 0.3s;
        }

        .photo-grid img:first-child {
            grid-row: span 2;
            aspect-ratio: 3/8;
        }

        .photo-grid img:hover {
            transform: scale(1.05) rotate(-2deg);
        }

        .teddy-bear {
            position: absolute;
            left: -60px;
            top: 50%;
            transform: translateY(-50%);
            max-width: 160px;
            opacity: 0.95;
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.2));
            z-index: 2;
            transition: transform 0.3s;
        }

        .teddy-bear:hover {
            transform: translateY(-50%) scale(1.05);
        }

        @media (max-width: 768px) {
            .teddy-bear {
                position: relative;
                left: 0;
                top: 0;
                transform: none;
                max-width: 120px;
            }
        }

        /* Right Section - Invitation Text & Button */
        .right-section {
            display: flex;
            flex-direction: column;
            gap: 30px;
            text-align: center;
        }

        .invitation-text {
            letter-spacing: 1px;
            line-height: 1.8;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .invitation-text h1 {
            font-size: 34px;
            color: #b39ddb;
            margin-bottom: 18px;
            font-weight: normal;
        }

        .invitation-text p {
            font-size: 15px;
            color: #7a6b7a;
            text-transform: uppercase;
            word-spacing: 4px;
            line-height: 2;
        }

        .highlight {
            color: #d4a5a0;
            font-style: italic;
        }

        .btn-rsvp {
            background: linear-gradient(135deg, #d4a5a0, #b39ddb);
            color: white;
            border: none;
            padding: 14px 35px;
            border-radius: 30px;
            font-size: 15px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.4s ease;
            font-family: 'Georgia', serif;
            box-shadow: 0 8px 20px rgba(212, 165, 160, 0.3);
        }

        .btn-rsvp:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 12px 28px rgba(212, 165, 160, 0.5);
        }

        /* Envelope & Heart */
        .envelope {
            position: relative;
            width: 140px;
            height: 90px;
            margin: 0 auto 20px auto;
            cursor: pointer;
        }


        .envelope-flap {
            width: 0;
            height: 0;
            border-left: 70px solid transparent;
            border-right: 70px solid transparent;
            border-bottom: 40px solid #ffb6c1;
            position: absolute;
            top: -40px;
            left: 0;
            transition: transform 0.5s ease;
            transform-origin: top center;
        }

        .envelope:hover .envelope-flap {
            transform: rotateX(-15deg);
        }

        .envelope-body {
            width: 100%;
            height: 100%;
            background: #ffe4e1;
            /* light pink */
            border: 2px solid #ffb6c1;
            border-radius: 6px;
            position: relative;
            z-index: 1;
        }

        .envelope-heart {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%) scale(0);
            font-size: 26px;
            opacity: 0;
            transition: transform 0.5s ease, opacity 0.5s ease;
        }

        .envelope:hover .envelope-heart {
            transform: translateX(-50%) scale(1.4) rotate(-10deg);
        }

        @keyframes pulse {

            0%,
            100% {
                transform: translateX(-50%) scale(1);
            }

            50% {
                transform: translateX(-50%) scale(1.2);
            }
        }

        .invited-text {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            color: #d946a0;
            font-style: italic;
            white-space: nowrap;
            opacity: 0;
            /* hide initially */
            pointer-events: none;
            /* ignore clicks */
            transition: opacity 0.5s ease, transform 0.5s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .invited-text.show {
            opacity: 1;
            animation: float 2s infinite ease-in-out;
            /* show float animation only when visible */
        }

        .envelope-flap {
            transition: transform 0.8s ease;
            /* increase time for full flip */
        }


        @keyframes float {

            0%,
            100% {
                transform: translateX(-50%) translateY(0);
            }

            50% {
                transform: translateX(-50%) translateY(-6px);
            }
        }
    </style>
</head>

<body>
    <!-- Floating Effects -->
    <div class="bokeh" style="left:10%; top:70%;"></div>
    <div class="bokeh" style="left:80%; top:50%;"></div>
    <div class="bokeh" style="left:50%; top:80%;"></div>
    <div class="sparkle" style="left:20%; top:40%;"></div>
    <div class="sparkle" style="left:70%; top:20%;"></div>
    <div class="confetti" style="left:30%; top:0;"></div>
    <div class="confetti" style="left:60%; top:-50px;"></div>
    <div class="confetti" style="left:90%; top:-100px;"></div>


    <div class="container" id="invitationContainer">
        <div class="invitation-card" id="invitationCard">
            <div class="left-section">
                <svg class="teddy-bear" viewBox="0 0 200 280" xmlns="http://www.w3.org/2000/svg">
                    <!-- Teddy bear SVG code omitted for brevity, same as above -->
                </svg>

                <div class="photo-grid">
                    <img src="public/eli1.jpg" alt="Baby photo 1">
                    <img src="public/eli2.jpg" alt="Baby photo 2">
                    <img src="public/eli3.jpg" alt="Baby photo 3">
                </div>
            </div>

            <div class="right-section">
                <!-- Keep invited text -->
                <div class="invited-text show">You're invited!</div>

                <div class="invitation-text">
                    <h1>Hi! I'm Ellie 🧸</h1>
                    <p>I would love for you to come to my</p>
                    <p><strong>Special Celebration!</strong></p>
                    <p><span class="highlight">Date:</span> April 25, 2026</p>
                </div>

                <button class="btn-rsvp" id="rsvpBtn">
                    Click me to see Ellie's video invitation 🎥
                </button>
            </div>
        </div>
    </div>

   <script>
    const rsvpBtn = document.getElementById('rsvpBtn');

    rsvpBtn.addEventListener('click', () => {
        // Optional: play an animation on the invited text (floating effect)
        const invitedText = document.querySelector('.invited-text');
        invitedText.classList.add('show');

        // Redirect to video page
        window.location.href = 'video.html';
    });
</script>

</body>

</html>
